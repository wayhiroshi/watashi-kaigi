<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>申込管理 | 私会議</title>
    <link rel="stylesheet" href="/admin/admin.css">
    <script src="/admin/admin.js" defer></script>
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <img src="/assets/top.png" alt="" aria-hidden="true">
        <div>
          <p>私会議</p>
          <h1>申込管理</h1>
        </div>
      </div>
      <div class="header-actions">
        <span id="viewer" class="viewer"></span>
        <button id="refresh" class="icon-button" type="button" aria-label="最新情報に更新" title="最新情報に更新">↻</button>
      </div>
    </header>

    <main>
      <section class="summary" aria-label="申込状況">
        <div><span>申込</span><strong id="total-count">-</strong></div>
        <div><span>決済完了</span><strong id="paid-count">-</strong></div>
        <div><span>決済失敗</span><strong id="failed-count">-</strong></div>
        <div><span>通知エラー</span><strong id="notification-error-count">-</strong></div>
      </section>

      <section class="workspace" aria-labelledby="registrations-title">
        <div class="workspace-heading">
          <div>
            <h2 id="registrations-title">申込者一覧</h2>
            <p id="updated-at" class="updated-at"></p>
          </div>
          <div class="filters">
            <label>
              <span class="sr-only">申込者を検索</span>
              <input id="search" type="search" placeholder="氏名・メール・電話番号で検索" autocomplete="off">
            </label>
            <label>
              <span class="sr-only">決済状態</span>
              <select id="status-filter">
                <option value="all">すべての決済状態</option>
                <option value="paid">決済完了</option>
                <option value="failed">決済失敗</option>
                <option value="unpaid">未払い</option>
              </select>
            </label>
          </div>
        </div>

        <div id="message" class="message" role="status">読み込み中...</div>
        <div id="table-wrap" class="table-wrap" hidden>
          <table>
            <thead>
              <tr>
                <th>申込者</th>
                <th>連絡先</th>
                <th>希望日</th>
                <th>決済</th>
                <th>通知</th>
                <th>申込日時</th>
              </tr>
            </thead>
            <tbody id="registration-rows"></tbody>
          </table>
        </div>
      </section>
    </main>
  </body>
</html>
